<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pixie's Pantry | Dab Straws</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; padding: 20px; }
        .card { position: relative; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { max-width: 100%; height: 160px; object-fit: contain; }
        .brand-badge { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-top: 10px; }
        .title { font-weight: bold; margin: 5px 0; font-size: 0.9em; height: 2.4em; overflow: hidden; }
        .price { font-weight: 800; color: #111; }
        
        /* The Link Shortcut Icon */
        .link-shortcut {
            position: absolute; top: 10px; right: 10px; background: #fff; width: 30px; height: 30px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.8em; color: #888; border: 1px solid #eee; z-index: 5; transition: 0.2s;
        }
        .link-shortcut:hover { background: #111; color: #fff; border-color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="padding: 20px 0;"><a href="../index.html">← Master Catalog</a></nav>
        <h1>Dab Straws</h1>
        <div class="grid">
            
    <div class="card" onclick="openModal('Pulsar CORE 5” Quartz Dab Straw | 10ct Display')">
        
    <div class="link-shortcut" title="Copy Direct Link" 
         onclick="event.stopPropagation(); copyDirectLink('Pulsar CORE 5” Quartz Dab Straw | 10ct Display')">
        <i class="fa-solid fa-link"></i>
    </div>
        <div class="image-container"><img src="https://cdn.shopify.com/s/files/1/0568/2780/5886/files/pulsar-core-quartz-dab-straw-display.webp?v=1773000897" loading="lazy"></div>
        <div class="brand-badge">Pulsar</div>
        <div class="title">Pulsar CORE 5” Quartz Dab Straw | 10ct Display</div>
        <div class="price">From $98.99</div>
    </div>
    <div class="card" onclick="openModal('Unbranded 6” Glass Rose Dab Straw')">
        
    <div class="link-shortcut" title="Copy Direct Link" 
         onclick="event.stopPropagation(); copyDirectLink('Unbranded 6” Glass Rose Dab Straw')">
        <i class="fa-solid fa-link"></i>
    </div>
        <div class="image-container"><img src="https://cdn.shopify.com/s/files/1/0568/2780/5886/files/glass-rose-dab-straw-1.jpg?v=1768885703" loading="lazy"></div>
        <div class="brand-badge">Dyspensr Wholesale</div>
        <div class="title">Unbranded 6” Glass Rose Dab Straw</div>
        <div class="price">From $22.99</div>
    </div>
        </div>
    </div>
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function copyDirectLink(name) {
            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            const url = window.location.origin + "/index.html?p=" + slug;
            navigator.clipboard.writeText(url).then(() => alert("Link Copied!"));
        }
    </script>
</body>
</html>
