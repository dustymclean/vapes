<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pixie's Pantry | Pollen Press</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #fff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 20px; padding: 20px; }
        .card { position: relative; border: 1px solid #eee; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { max-width: 100%; height: 160px; object-fit: contain; }
        .brand-badge { font-size: 0.7em; color: #aaa; text-transform: uppercase; margin-top: 10px; }
        .title { font-weight: bold; margin: 5px 0; font-size: 0.9em; height: 2.4em; overflow: hidden; }
        .price { font-weight: 800; color: #111; }
        
        /* The Link Shortcut Icon */
        .link-shortcut {
            position: absolute; top: 10px; right: 10px; background: #fff; width: 30px; height: 30px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.8em; color: #888; border: 1px solid #eee; z-index: 5; transition: 0.2s;
        }
        .link-shortcut:hover { background: #111; color: #fff; border-color: #111; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="padding: 20px 0;"><a href="../index.html">← Master Catalog</a></nav>
        <h1>Pollen Press</h1>
        <div class="grid">
            
    <div class="card" onclick="openModal('Kannastor 18mm Pollen Press')">
        
    <div class="link-shortcut" title="Copy Direct Link" 
         onclick="event.stopPropagation(); copyDirectLink('Kannastor 18mm Pollen Press')">
        <i class="fa-solid fa-link"></i>
    </div>
        <div class="image-container"><img src="https://cdn.shopify.com/s/files/1/0568/2780/5886/files/Kannastor_18mm_Pollen_Press_7_c06203e6-d98a-451a-ad02-0d90fe460787.jpg?v=1749467680" loading="lazy"></div>
        <div class="brand-badge">Kannastor</div>
        <div class="title">Kannastor 18mm Pollen Press</div>
        <div class="price">From $24.99</div>
    </div>
    <div class="card" onclick="openModal('Kannastor 14mm Pollen Press')">
        
    <div class="link-shortcut" title="Copy Direct Link" 
         onclick="event.stopPropagation(); copyDirectLink('Kannastor 14mm Pollen Press')">
        <i class="fa-solid fa-link"></i>
    </div>
        <div class="image-container"><img src="https://cdn.shopify.com/s/files/1/0568/2780/5886/files/Kannastor_14mm_Pollen_Press_4_e736946a-de39-43f6-81e7-c23d627ca7c7.jpg?v=1749467698" loading="lazy"></div>
        <div class="brand-badge">Kannastor</div>
        <div class="title">Kannastor 14mm Pollen Press</div>
        <div class="price">From $18.99</div>
    </div>
        </div>
    </div>
    <script src="../js/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function copyDirectLink(name) {
            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            const url = window.location.origin + "/index.html?p=" + slug;
            navigator.clipboard.writeText(url).then(() => alert("Link Copied!"));
        }
    </script>
</body>
</html>
