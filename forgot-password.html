<div class="form-header">
    <h1>Reset Access</h1>
    <p>Enter your email and we'll send a pantry recovery link.</p>
</div>
<form id="forgotForm">
    <div class="input-box">
        <label>Account Email</label>
        <input type="email" id="f_email" required>
    </div>
    <button type="submit" class="btn-submit" id="f_btn">Send Recovery Link</button>
</form>
<div id="f_msg" style="margin-top:20px; display:none; text-align:center;"></div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('f_btn');
    const msg = document.getElementById('f_msg');
    btn.disabled = true; msg.style.display="block"; msg.innerText="Sending...";

    try {
        const res = await fetch('https://vapes.pixiespantryshop.com/api/v1/auth/forgot-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: document.getElementById('f_email').value })
        });
        msg.innerText = "Check your inbox. If an account exists, a link is on the way.";
    } catch (err) { btn.disabled = false; msg.innerText = "Error connecting to server."; }
});
</script>
