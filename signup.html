<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Register | Pixie's Pantry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #111; --sidebar-w: 260px; --border: #eaeaea; --muted: #888; --accent: #8a2be2; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; color: var(--primary); margin: 0; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w); background: #fafafa; border-right: 1px solid var(--border); padding: 40px 28px; overflow-y: auto; }
        .sidebar-logo { font-size: 22px; font-weight: 700; color: #000; text-decoration: none; display: block; margin-bottom: 30px; letter-spacing: -0.5px; }
        .sidebar-logo span { font-weight: 300; color: var(--muted); }
        .main-wrapper { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
        .main-content { padding: 80px 50px; max-width: 600px; }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .input-box input { width: 100%; border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .compliance { background: #fafafa; border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 12px; font-size: 13px; }
        .btn-action { background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-action:hover { background: var(--accent); }
        #fb { margin-top: 20px; font-size: 14px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: 600; }
    </style>
</head>
<body>
    <aside class="sidebar"><a href="index.html" class="sidebar-logo">Pixie's <span>Pantry</span></a></aside>
    <div class="main-wrapper">
        <main class="main-content">
            <h1 style="font-weight:900; letter-spacing:-1.5px;">Member Access</h1>
            <form id="regForm">
                <div class="input-box"><label>Name</label><input type="text" id="r_name" required></div>
                <div class="input-box"><label>Email Address</label><input type="email" id="r_email" required></div>
                <div class="input-box"><label>Password</label><input type="password" id="r_pass" required></div>
                <div class="compliance">
                    <input type="checkbox" required>
                    <label>I verify I am 21+ and agree to the compliance standards.</label>
                </div>
                <button type="submit" class="btn-action" id="r_btn">CREATE ACCOUNT</button>
            </form>
            <div id="fb"></div>
            <div style="margin-top:40px; text-align:center; border-top:1px solid var(--border); padding-top:20px;">
                <a href="login.html" style="font-weight:900; font-size:22px; color:#000; text-decoration:none;">ALREADY HAVE AN ACCOUNT? LOG IN</a>
            </div>
        </main>
    </div>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('r_btn');
            const fb = document.getElementById('fb');
            btn.disabled = true; btn.innerText = "POSTING TO DATABASE...";
            fb.style.display = "block"; fb.innerText = "Reaching FormPress...";
            try {
                const res = await fetch('https://vapes.pixiespantryshop.com/api/v1/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('r_name').value,
                        email: document.getElementById('r_email').value,
                        password: document.getElementById('r_pass').value
                    })
                });
                if (res.ok) {
                    fb.style.color = "green"; fb.innerText = "SUCCESS. Redirecting home...";
                    setTimeout(() => { window.location.href = "index.html"; }, 1500);
                } else { throw new Error("Email already registered or server busy."); }
            } catch (err) {
                btn.disabled = false; btn.innerText = "CREATE ACCOUNT";
                fb.style.color = "red"; fb.innerText = "ERROR: " + err.message;
            }
        });
    </script>
</body>
</html>
